<div class="container">
  <div class="box"></div>
  <div class="wrapper">
    <div class="rect"></div>
    <div class="rect"></div>
    <div class="rect"></div>
    <div class="rect"></div>
  </div>
</div>


<style>
  body{
    background:#30383F;
    margin:0;
  }
  .container{
    height:100vh;
    width:100vw;
    display:grid;
    place-content:center;
  }
  .wrapper{
    height:100px;
    width:360px;
    position:absolute;
    left:20;
    top:100;
    display:grid;
    grid-template-rows:repeat(2,75px);
    grid-template-columns:repeat(2,310px)
  }
  .rect{
    height:25px;
    width:50px;
    background:#F4DCBF;
    
  }
  .box{
    height:100px;
    width:160px;
    border:50px solid #F4DCBF;
    mask:conic-gradient(
      at 60px 60px,
      red 75%,
      #0000 0
    )25vw/100%1%
  }
</style>
