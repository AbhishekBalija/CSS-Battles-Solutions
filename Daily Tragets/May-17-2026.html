<div class="container">
  <div class="circle t"></div>
  <div class="circle b"></div>
  <div class="circle l"></div>
  <div class="circle r"></div>
</div>

<style>
  body{
    background:#594C94;
    margin:20 60 60 20
  }
  .container{
    height:100%;
    width:100%;
    background:#EEEDED;
    position:relative;
    overflow:hidden;
    border:20px solid #EEEDED
  }
  .circle{
    background:#594C94;
    height:180px;
    width:180px;
    clip-path:circle();
    position:absolute;
  }
  .t{
    translate:70px -90px
  }
   .b{
    translate:70px 130px
  }
   .r{
    translate:230px 20px
  } 
  .l{
    translate:-90px 20px
  }
</style>
