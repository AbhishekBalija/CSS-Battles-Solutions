<div class="container">

  <div class="sq br"></div>

</div>

<style>
body{
  margin:0;
  background:#EFEADE;
  display:grid;
  place-items:center;
  height:100vh;
}

  position:relative;
}

.sq,.big{
  position:absolute;
  background:#B29DF7;
}

.sq{
  width:80px;
  height:80px;
}

.big{
  width:120px;
  height:120px;

    #B29DF7 75%,
    #594F7C 0
  )0 0/80px 80px
}


.tr{top:0;right:0}
.bl{bottom:0;left:0}
.br{bottom:0;right:0}
</style>
