<div class="container">
  <div class="leaf up"></div>
  <div class="leaf"></div>
  <div class="leaf down"></div>
</div>

<style>
  body{
    background:#0B2429;
    display:grid;
    place-content:center
  }
  .container{
    height:240;
    width:240;
    display:grid;
    place-content:center;
    overflow:hidden
  }
  .leaf{
    height:120;
    width:120;
    background:#998235;
    border-radius:50% 0 50% 50%
  }
  .up,.down{
    background:#F3AC3C;
  }
  .up{
    translate:60px 60px;
    z-index:-1;
    scale:-1;
  }
  .down{
    translate:-60px -60px
  }
</style>
