<div class="container">
  <div class="semi-circle left"></div>
  <div class="circle"></div>
  <div class="semi-circle right"></div>
</div>
<style>
  body{
    background:#191210;
  }
  .container{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:25px
  }
  .circle{
    width:50;
    height:50;
    background:#84271C;
    border-radius:50%;
    box-shadow:0 0 0 25px #191210,0 0 0 45px #ECA03D
  }
  .semi-circle{
    border:20px solid #ECA03D;
    height:30;
    width:60;
    border-radius:100px 100px 0 0;
    border-bottom:0;
  }
  .right{
    translate:0 -25px
  }
  .left{
    translate:0 25px;
    scale:-1;
  }
</style>
