<div class="container">
  <div class="semi-circle left"></div>
  <div class="semi-circle center"></div>
  <div class="semi-circle right"></div>
  <div class="circle"></div>
</div>

<style>
  body{
    background:#F5D6B4;
  }
  .container{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center
  }
  .semi-circle{
    border: 20px solid #D86F45;
    height:30px;
    width:60px;
    border-radius:100px 100px 0 0;
    border-bottom:0;
  }
  .circle{
    background:#D86F45;
    width:20px;
    height:20px;
    position:absolute;
    border-radius:50%;
    left:70;
    top:140;
    box-shadow:240px 0 #D86F45
  }
  .center{
    translate:0 -25px
  }
  .left{
    scale:-1;
    translate:20px 25px
  }
  .right{
    scale:-1;
    translate:-20px 25px
  }
</style>
